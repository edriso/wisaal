# CI + push-to-deploy. The `test` job (typecheck, lint, tests) runs on every
# push to main AND on every pull request to main, so dependency-bump PRs (e.g.
# Renovate bumping telegram-bot-kit) show a green/red check before merge. The
# `deploy` job runs ONLY on a push to main: it SSHes into the VPS, pulls the
# latest code, then rebuilds this bot's container.
#
# Database migrations: the deploy step runs the one-off `wisaal-migrate`
# compose service (defined on the server in /opt/bots/docker-compose.yml from
# the hetzner-cloud-server `compose-with-db.yml` template; its command is
# `pnpm db:deploy` = `prisma migrate deploy`, which is idempotent) BEFORE
# (re)starting the bot, so a new migration applies automatically on every push.
#
# Required GitHub secrets (repo -> Settings -> Secrets and variables ->
# Actions -> New repository secret):
#   SERVER_IP  the VPS IP address
#   SSH_KEY    a private SSH key whose public half is in the server's
#              /root/.ssh/authorized_keys
#
# Until both secrets are set, this workflow fails at the connect step —
# that is expected; add the secrets to activate it.
name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Gate: typecheck + lint + tests must pass before we touch production. A push
  # that breaks the build never reaches the server. Also runs on PRs so bump
  # PRs are checked.
  test:
    runs-on: ubuntu-latest
    # Dummy values so `prisma generate` (postinstall) and any config import do
    # not fail; the tests mock the database and never actually connect.
    env:
      DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      BOT_TOKEN: ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  deploy:
    needs: test
    # Only deploy on a real push to main, never on a pull request.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/bots/telegram/wisaal && git pull
            cd /opt/bots
            docker compose run --rm --build wisaal-migrate
            docker compose up -d --build wisaal
            docker image prune -f
